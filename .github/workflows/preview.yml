name: Deploy Branch Preview

on:
  push:
    branches: ['feature/**']

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get branch slug
        id: slug
        run: echo "slug=$(echo ${GITHUB_REF_NAME} | sed 's/[^a-zA-Z0-9]/-/g')" >> $GITHUB_OUTPUT
      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r project/employee-app/. _site/
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          target-folder: preview/${{ steps.slug.outputs.slug }}
          clean: false
