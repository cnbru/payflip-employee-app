name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r project/employee-app/. _site/
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          clean-exclude: preview/
