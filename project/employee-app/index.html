  <style>
    html, body { margin: 0; padding: 0; }
    body {
      background: #F2F2F2;
      font-family: var(--font-body);
      color: var(--text-default);
    }
    #root { min-height: 100vh; }
    button:focus-visible { outline: 2px solid var(--blue-500); outline-offset: 2px; border-radius: 8px; }
    .hide-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }

    /* ── Modal & sheet transitions (transitions.dev 06-modal) ── */
    :root {
      --modal-open-dur: 250ms;
      --modal-close-dur: 150ms;
      --modal-scale: 0.96;
      --modal-ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    /* For panels with no conflicting transform */
    .t-modal {
      transform: scale(var(--modal-scale));
      opacity: 0;
      transition: transform var(--modal-open-dur) var(--modal-ease),
                  opacity   var(--modal-open-dur) var(--modal-ease);
      will-change: transform, opacity;
    }
    .t-modal.is-open   { transform: scale(1); opacity: 1; }
    .t-modal.is-closing {
      transform: scale(var(--modal-scale));
      opacity: 0;
      transition: transform var(--modal-close-dur) var(--modal-ease),
                  opacity   var(--modal-close-dur) var(--modal-ease);
    }
    /* For panels that already use transform: translate(…) — animate via standalone scale */
    @keyframes _modalEnter { from { opacity: 0; scale: 0.96; } to { opacity: 1; scale: 1; } }
    @keyframes _modalLeave { from { opacity: 1; scale: 1; }   to { opacity: 0; scale: 0.96; } }
    .t-modal-enter { animation: _modalEnter var(--modal-open-dur)  var(--modal-ease) both; }
    .t-modal-leave { animation: _modalLeave var(--modal-close-dur) var(--modal-ease) both; }
    /* Bottom-sheet slide-up */
    .t-sheet {
      transform: translateY(100%);
      transition: transform 320ms var(--modal-ease);
      will-change: transform;
    }
    .t-sheet.is-open    { transform: translateY(0); }
    .t-sheet.is-closing { transform: translateY(100%); transition: transform 200ms var(--modal-ease); }
    @media (prefers-reduced-motion: reduce) {
      .t-modal, .t-sheet { transition: none !important; }
      .t-modal-enter, .t-modal-leave { animation: none !important; }
    }
  </style>
